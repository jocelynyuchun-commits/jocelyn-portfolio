<svg width="1400" height="900" viewBox="0 0 1400 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1400" height="900" fill="#F8F9FA"/>
  
  <!-- Title -->
  <text x="700" y="60" font-family="Inter, sans-serif" font-size="32" font-weight="700" fill="#142D51" text-anchor="middle">
    Token Synchronization Flow
  </text>
  <text x="700" y="95" font-family="Inter, sans-serif" font-size="16" font-weight="400" fill="#6B7280" text-anchor="middle">
    AI-Governed Design System — From Design Tokens to Production Code
  </text>
  
  <!-- Step 1: Figma Design Tokens -->
  <g id="step1">
    <rect x="80" y="160" width="280" height="580" rx="12" fill="white" stroke="#E5E7EB" stroke-width="2"/>
    
    <!-- Step number -->
    <circle cx="120" cy="200" r="24" fill="#142D51"/>
    <text x="120" y="208" font-family="Inter, sans-serif" font-size="18" font-weight="700" fill="white" text-anchor="middle">1</text>
    
    <text x="160" y="208" font-family="Inter, sans-serif" font-size="18" font-weight="600" fill="#142D51">
      Figma Design Tokens
    </text>
    
    <!-- Layer 1: Primitives -->
    <rect x="110" y="240" width="220" height="140" rx="8" fill="#F0F4F8" stroke="#142D51" stroke-width="1.5"/>
    <text x="220" y="265" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#142D51" text-anchor="middle">
      LAYER 1: PRIMITIVES
    </text>
    <text x="120" y="295" font-family="JetBrains Mono, monospace" font-size="11" fill="#4A5568">
      <tspan x="120" dy="0">Color/Blue-900: #142d51</tspan>
      <tspan x="120" dy="18">Color/Blue-700: #255090</tspan>
      <tspan x="120" dy="18">Color/Blue-500: #2f71d4</tspan>
      <tspan x="120" dy="18">Color/Neutral-300: #c5c5c5</tspan>
    </text>
    
    <!-- Layer 2: Semantic -->
    <rect x="110" y="400" width="220" height="120" rx="8" fill="#E8F0FC" stroke="#2F71D4" stroke-width="1.5"/>
    <text x="220" y="425" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#142D51" text-anchor="middle">
      LAYER 2: SEMANTIC
    </text>
    <text x="120" y="450" font-family="JetBrains Mono, monospace" font-size="11" fill="#4A5568">
      <tspan x="120" dy="0">--color-primary:</tspan>
      <tspan x="120" dy="18">  var(--color-blue-900)</tspan>
      <tspan x="120" dy="18">--color-disabled:</tspan>
      <tspan x="120" dy="18">  var(--color-neutral-300)</tspan>
    </text>
    
    <!-- Layer 3: Component -->
    <rect x="110" y="540" width="220" height="120" rx="8" fill="#E4EAF4" stroke="#90A5C4" stroke-width="1.5"/>
    <text x="220" y="565" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#142D51" text-anchor="middle">
      LAYER 3: COMPONENT
    </text>
    <text x="120" y="590" font-family="JetBrains Mono, monospace" font-size="11" fill="#4A5568">
      <tspan x="120" dy="0">Buttons/Solid/Default:</tspan>
      <tspan x="120" dy="18">  #142d51</tspan>
      <tspan x="120" dy="18">Buttons/Solid/Disabled:</tspan>
      <tspan x="120" dy="18">  #c5c5c5</tspan>
    </text>
    
    <text x="220" y="710" font-family="Inter, sans-serif" font-size="12" font-weight="500" fill="#6B7280" text-anchor="middle">
      Brand 1 Mode
    </text>
  </g>
  
  <!-- Arrow 1 -->
  <g id="arrow1">
    <path d="M 360 450 L 430 450" stroke="#142D51" stroke-width="3" marker-end="url(#arrowhead)"/>
    <text x="395" y="440" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#142D51" text-anchor="middle">
      Export
    </text>
  </g>
  
  <!-- Step 2: JSON Export -->
  <g id="step2">
    <rect x="430" y="160" width="280" height="580" rx="12" fill="white" stroke="#E5E7EB" stroke-width="2"/>
    
    <circle cx="470" cy="200" r="24" fill="#142D51"/>
    <text x="470" y="208" font-family="Inter, sans-serif" font-size="18" font-weight="700" fill="white" text-anchor="middle">2</text>
    
    <text x="510" y="208" font-family="Inter, sans-serif" font-size="18" font-weight="600" fill="#142D51">
      JSON Token Files
    </text>
    
    <!-- Primitives.json -->
    <rect x="460" y="240" width="220" height="200" rx="8" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.5"/>
    <text x="570" y="265" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#92400E" text-anchor="middle">
      Primitives.json
    </text>
    <text x="470" y="295" font-family="JetBrains Mono, monospace" font-size="10" fill="#4A5568">
      <tspan x="470" dy="0">{</tspan>
      <tspan x="470" dy="16">  "variables": [</tspan>
      <tspan x="470" dy="16">    {</tspan>
      <tspan x="470" dy="16">      "name": "Color/Blue-900",</tspan>
      <tspan x="470" dy="16">      "valuesByMode": {</tspan>
      <tspan x="470" dy="16">        "Brand 1": {</tspan>
      <tspan x="470" dy="16">          "r": 0.078, "g": 0.176,</tspan>
      <tspan x="470" dy="16">          "b": 0.317, "a": 1</tspan>
      <tspan x="470" dy="16">        }</tspan>
      <tspan x="470" dy="16">      }</tspan>
      <tspan x="470" dy="16">    }</tspan>
      <tspan x="470" dy="16">  ]</tspan>
      <tspan x="470" dy="16">}</tspan>
    </text>
    
    <!-- Semantic.json -->
    <rect x="460" y="460" width="220" height="200" rx="8" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.5"/>
    <text x="570" y="485" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#1E40AF" text-anchor="middle">
      Semantic.json
    </text>
    <text x="470" y="515" font-family="JetBrains Mono, monospace" font-size="10" fill="#4A5568">
      <tspan x="470" dy="0">{</tspan>
      <tspan x="470" dy="16">  "variables": [</tspan>
      <tspan x="470" dy="16">    {</tspan>
      <tspan x="470" dy="16">      "name": "Buttons/Solid/</tspan>
      <tspan x="470" dy="16">              Default",</tspan>
      <tspan x="470" dy="16">      "resolvedValue": {</tspan>
      <tspan x="470" dy="16">        "r": 0.078, "g": 0.176,</tspan>
      <tspan x="470" dy="16">        "b": 0.317, "a": 1</tspan>
      <tspan x="470" dy="16">      }</tspan>
      <tspan x="470" dy="16">    }</tspan>
      <tspan x="470" dy="16">  ]</tspan>
      <tspan x="470" dy="16">}</tspan>
    </text>
    
    <text x="570" y="710" font-family="Inter, sans-serif" font-size="12" font-weight="500" fill="#6B7280" text-anchor="middle">
      Machine-readable format
    </text>
  </g>
  
  <!-- Arrow 2 -->
  <g id="arrow2">
    <path d="M 710 450 L 780 450" stroke="#142D51" stroke-width="3" marker-end="url(#arrowhead)"/>
    <text x="745" y="440" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#142D51" text-anchor="middle">
      Parse
    </text>
  </g>
  
  <!-- Step 3: CSS Variables -->
  <g id="step3">
    <rect x="780" y="160" width="280" height="580" rx="12" fill="white" stroke="#E5E7EB" stroke-width="2"/>
    
    <circle cx="820" cy="200" r="24" fill="#142D51"/>
    <text x="820" y="208" font-family="Inter, sans-serif" font-size="18" font-weight="700" fill="white" text-anchor="middle">3</text>
    
    <text x="860" y="208" font-family="Inter, sans-serif" font-size="18" font-weight="600" fill="#142D51">
      CSS Token System
    </text>
    
    <!-- tokens.css -->
    <rect x="810" y="240" width="220" height="420" rx="8" fill="#F0FDF4" stroke="#10B981" stroke-width="1.5"/>
    <text x="920" y="265" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#065F46" text-anchor="middle">
      tokens.css
    </text>
    
    <text x="820" y="295" font-family="JetBrains Mono, monospace" font-size="10" fill="#4A5568">
      <tspan x="820" dy="0">:root {</tspan>
      <tspan x="820" dy="18">  /* Layer 1: Primitives */</tspan>
      <tspan x="820" dy="18">  --color-blue-900: #142d51;</tspan>
      <tspan x="820" dy="18">  --color-blue-700: #255090;</tspan>
      <tspan x="820" dy="18">  --color-neutral-300: #c5c5c5;</tspan>
      <tspan x="820" dy="30">  /* Layer 2: Semantic */</tspan>
      <tspan x="820" dy="18">  --color-primary:</tspan>
      <tspan x="820" dy="18">    var(--color-blue-900);</tspan>
      <tspan x="820" dy="18">  --color-disabled:</tspan>
      <tspan x="820" dy="18">    var(--color-neutral-300);</tspan>
      <tspan x="820" dy="30">  /* Layer 3: Component */</tspan>
      <tspan x="820" dy="18">  --button-solid-bg-default:</tspan>
      <tspan x="820" dy="18">    var(--color-primary);</tspan>
      <tspan x="820" dy="18">  --button-solid-bg-disabled:</tspan>
      <tspan x="820" dy="18">    var(--color-disabled);</tspan>
      <tspan x="820" dy="18">}</tspan>
    </text>
    
    <text x="920" y="710" font-family="Inter, sans-serif" font-size="12" font-weight="500" fill="#6B7280" text-anchor="middle">
      CSS Custom Properties
    </text>
  </g>
  
  <!-- Arrow 3 -->
  <g id="arrow3">
    <path d="M 1060 450 L 1130 450" stroke="#142D51" stroke-width="3" marker-end="url(#arrowhead)"/>
    <text x="1095" y="440" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#142D51" text-anchor="middle">
      Apply
    </text>
  </g>
  
  <!-- Step 4: Components -->
  <g id="step4">
    <rect x="1130" y="160" width="220" height="580" rx="12" fill="white" stroke="#E5E7EB" stroke-width="2"/>
    
    <circle cx="1170" cy="200" r="24" fill="#142D51"/>
    <text x="1170" y="208" font-family="Inter, sans-serif" font-size="18" font-weight="700" fill="white" text-anchor="middle">4</text>
    
    <text x="1210" y="208" font-family="Inter, sans-serif" font-size="18" font-weight="600" fill="#142D51">
      Components
    </text>
    
    <!-- Button.css -->
    <rect x="1160" y="240" width="160" height="180" rx="8" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="1.5"/>
    <text x="1240" y="265" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#5B21B6" text-anchor="middle">
      button.css
    </text>
    <text x="1170" y="290" font-family="JetBrains Mono, monospace" font-size="9.5" fill="#4A5568">
      <tspan x="1170" dy="0">.button--solid {</tspan>
      <tspan x="1170" dy="16">  background:</tspan>
      <tspan x="1170" dy="16">    var(--button-</tspan>
      <tspan x="1170" dy="16">      solid-bg-</tspan>
      <tspan x="1170" dy="16">      default);</tspan>
      <tspan x="1170" dy="16">}</tspan>
      <tspan x="1170" dy="20">.button--solid:</tspan>
      <tspan x="1170" dy="16">  disabled {</tspan>
      <tspan x="1170" dy="16">  background:</tspan>
      <tspan x="1170" dy="16">    var(--button-</tspan>
      <tspan x="1170" dy="16">      solid-bg-</tspan>
      <tspan x="1170" dy="16">      disabled);</tspan>
      <tspan x="1170" dy="16">}</tspan>
    </text>
    
    <!-- Live Buttons -->
    <rect x="1160" y="440" width="160" height="220" rx="8" fill="#142D51"/>
    <text x="1240" y="465" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#E4EAF4" text-anchor="middle">
      Live Preview
    </text>
    
    <!-- Button examples -->
    <rect x="1185" y="485" width="110" height="36" rx="4" fill="#142d51" stroke="#142d51" stroke-width="1"/>
    <text x="1240" y="507" font-family="Inter, sans-serif" font-size="14" font-weight="500" fill="#ffffff" text-anchor="middle">
      Shop Now
    </text>
    <text x="1240" y="525" font-family="Inter, sans-serif" font-size="9" fill="#90A5C4" text-anchor="middle">
      Default
    </text>
    
    <rect x="1185" y="545" width="110" height="36" rx="4" fill="#255090" stroke="#255090" stroke-width="1"/>
    <text x="1240" y="567" font-family="Inter, sans-serif" font-size="14" font-weight="500" fill="#ffffff" text-anchor="middle">
      Shop Now
    </text>
    <text x="1240" y="585" font-family="Inter, sans-serif" font-size="9" fill="#90A5C4" text-anchor="middle">
      Hover
    </text>
    
    <rect x="1185" y="605" width="110" height="36" rx="4" fill="#c5c5c5" stroke="#c5c5c5" stroke-width="1"/>
    <text x="1240" y="627" font-family="Inter, sans-serif" font-size="14" font-weight="500" fill="#9b9b9b" text-anchor="middle">
      Shop Now
    </text>
    <text x="1240" y="645" font-family="Inter, sans-serif" font-size="9" fill="#90A5C4" text-anchor="middle">
      Disabled
    </text>
    
    <text x="1240" y="710" font-family="Inter, sans-serif" font-size="12" font-weight="500" fill="#6B7280" text-anchor="middle">
      Production-ready
    </text>
  </g>
  
  <!-- Key Benefits Box -->
  <g id="benefits">
    <rect x="80" y="790" width="1270" height="80" rx="8" fill="#142D51"/>
    <text x="700" y="820" font-family="Inter, sans-serif" font-size="16" font-weight="600" fill="#E4EAF4" text-anchor="middle">
      Key Benefits: Single Source of Truth
    </text>
    <text x="260" y="850" font-family="Inter, sans-serif" font-size="13" fill="#B8CCE4">
      ✓ Change #142d51 once → Updates everywhere
    </text>
    <text x="640" y="850" font-family="Inter, sans-serif" font-size="13" fill="#B8CCE4">
      ✓ Automated governance via CI/CD
    </text>
    <text x="1020" y="850" font-family="Inter, sans-serif" font-size="13" fill="#B8CCE4">
      ✓ Scalable for multi-brand systems
    </text>
  </g>
  
  <!-- Arrow marker definition -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#142D51"/>
    </marker>
  </defs>
</svg>
